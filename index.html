<section id="form-section" class="page section-enter">
  <div class="progress-bar">
    <div class="progress-label">Step <span id="step-num">1</span> of 4</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="form-header">
    <h2>Make a Wish, Wawa 🌸</h2>
    <p>Help me make your birthday perfect by picking your favorites.</p>
  </div>

  <div class="card">
    <div class="card-title">🗓️ Date & Time</div>
    <div class="input-row" style="display: flex; flex-wrap: wrap; gap: 1rem; grid-template-columns: none;">
      <div style="flex: 1; min-width: 150px;">
        <label>Date (May 2026 Only)</label>
        <input type="date" id="date" min="2026-05-01" max="2026-05-31" onchange="validateMayDate(this)">
      </div>
      <div style="flex: 1; min-width: 150px;">
        <label>Time</label>
        <input type="time" id="time">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🍽️ Restaurant Top Picks</div>
    <div class="options-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
      <div class="option-card" id="opt-alien" onclick="selectTopPick('Alien Bangkok', 'opt-alien')">
        <span class="emoji">🛸</span>
        <span class="label" style="font-weight: 600;">Alien Bangkok</span>
        <a href="https://maps.app.goo.gl/example1" target="_blank" onclick="event.stopPropagation()" style="font-size: 0.7rem; color: var(--rose-deep); text-decoration: none; display: block; margin-top: 4px;">📍 View Map</a>
      </div>
      <div class="option-card" id="opt-coda" onclick="selectTopPick('Coda Bangkok', 'opt-coda')">
        <span class="emoji">🍷</span>
        <span class="label" style="font-weight: 600;">Coda Bangkok</span>
        <a href="https://maps.app.goo.gl/example2" target="_blank" onclick="event.stopPropagation()" style="font-size: 0.7rem; color: var(--rose-deep); text-decoration: none; display: block; margin-top: 4px;">📍 View Map</a>
      </div>
    </div>
    
    <div class="other-input-wrap" id="rest-other-wrap">
      <input type="text" id="rest-other" placeholder="Or enter another place...">
    </div>
    <button class="btn-outline" style="width: 100%; margin-top: 8px;" onclick="toggleOther('rest')">Choose somewhere else...</button>
  </div>

  <div class="submit-wrap">
    <button class="btn btn-primary sparkle-btn" onclick="generatePlan()">
      Confirm My Plan 💕
    </button>
  </div>
</section>

<script>
  let selectedRest = ""; // Global to store top-pick choice

  // Restrict selection strictly to May
  function validateMayDate(input) {
    if (!input.value) return;
    const selected = new Date(input.value);
    if (selected.getMonth() !== 4) { // 4 represents May in JS Date
      showToast("Please select a date in May! 🌸");
      input.value = "";
    }
  }

  // Handle Top Pick Selection
  function selectTopPick(name, elementId) {
    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(elementId).classList.add('selected');
    document.getElementById('rest-other-wrap').classList.remove('visible');
    document.getElementById('rest-other').value = ""; // Clear manual input
    selectedRest = name;
  }

  // Toggle "Other" input
  function toggleOther(type) {
    const wrap = document.getElementById(type + '-other-wrap');
    wrap.classList.toggle('visible');
    if(wrap.classList.contains('visible')) {
      document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
      selectedRest = ""; // Reset pick if typing manually
    }
  }

  // Updated generatePlan to handle Top Picks
  function generatePlan() {
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;
    const otherRest = document.getElementById('rest-other').value;
    const finalRest = otherRest || selectedRest;

    if (!date || !finalRest) {
      showToast("Please pick a date and restaurant! ✨");
      return;
    }

    // Capture your original list data
    const gifts = Array.from(document.querySelectorAll('#gifts-list input')).map(i => i.value).filter(v => v);
    const wishes = Array.from(document.querySelectorAll('#wishes-list input')).map(i => i.value).filter(v => v);
    const note = document.getElementById('note').value;

    const plan = { date, time, rest: finalRest, gifts, wishes, note };
    localStorage.setItem('birthday-plan', JSON.stringify(plan));
    renderSummary();
  }
</script>
